<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rigveda Sukta Sangraha</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-dark: #4a2c2a;
      --saffron: #f4a261;
      --border-gold: #d4af37;
    }

    .telugu-text { font-family: 'Noto Sans Telugu', sans-serif; }

    body {
      margin: 0;
      padding: 20px;
      font-family: "Georgia", serif;
      background: #e0c097 url('https://www.transparenttextures.com/patterns/paper-fibers.png');
      color: var(--primary-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .main-wrapper {
      background: rgba(255, 252, 240, 0.96);
      border: 8px double var(--border-gold);
      border-radius: 4px;
      max-width: 700px;
      width: 100%;
      padding: 80px 40px;
      box-shadow: 0 0 50px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      font-family: 'Noto Sans Telugu', sans-serif;
      font-size: 52px;
      margin: 0 0 50px 0;
      font-weight: bold;
      color: #5e3a37;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }

    .action-section {
      padding-top: 20px;
    }

    .lang-btn {
      display: inline-block;
      text-decoration: none;
      color: var(--primary-dark);
      background: #fff8e7;
      padding: 22px 70px;
      border: 2px solid var(--border-gold);
      border-radius: 12px;
      font-size: 2.2rem;
      font-weight: bold;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .lang-btn:hover {
      background: var(--saffron);
      color: white;
      transform: scale(1.05);
      box-shadow: 0 12px 25px rgba(0,0,0,0.2);
      border-color: #e76f51;
    }

    @media (max-width: 600px) {
      h1 { font-size: 36px; }
      .lang-btn { padding: 18px 50px; font-size: 1.6rem; }
      .main-wrapper { padding: 60px 20px; }
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <h1 class="telugu-text">ఋగ్వేద సూక్త సంగ్రాహము</h1>

    <div class="action-section">
      <a href="Rigveda_Sukta_Sangraha - Telugu.html" class="lang-btn telugu-text">ప్రవేశం</a>
    </div>
  </div>

</body>
</html>
