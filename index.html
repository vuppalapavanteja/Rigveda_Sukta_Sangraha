<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rigveda Sukta Sangraha</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-dark: #4a2c2a;
      --saffron: #f4a261;
      --border-gold: #d4af37;
    }

    .telugu-text { font-family: 'Noto Sans Telugu', sans-serif; }

    body {
      margin: 0;
      padding: 20px;
      font-family: "Georgia", serif;
      background: #e0c097 url('https://www.transparenttextures.com/patterns/paper-fibers.png');
      color: var(--primary-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .main-wrapper {
      background: rgba(255, 252, 240, 0.96);
      border: 8px double var(--border-gold);
      border-radius: 4px;
      max-width: 800px; /* Narrowed since we only have one column now */
      width: 100%;
      padding: 60px 30px;
      box-shadow: 0 0 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    .image-header {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 35px;
    }

    .image-header img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid var(--border-gold);
      padding: 5px;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      font-family: 'Noto Sans Telugu', sans-serif;
      font-size: 48px;
      margin: 0 0 40px 0;
      font-weight: bold;
      letter-spacing: 1px;
      color: #5e3a37;
    }

    /* Container for the main entry button */
    .action-section {
      margin-top: 20px;
      padding-top: 30px;
      border-top: 1px solid rgba(212, 175, 55, 0.3);
    }

    .lang-btn {
      display: inline-block;
      text-decoration: none;
      color: var(--primary-dark);
      background: #fff8e7;
      padding: 20px 60px;
      border: 2px solid var(--border-gold);
      border-radius: 15px;
      font-size: 2rem;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .lang-btn:hover {
      background: var(--saffron);
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      border-color: #e76f51;
    }

    .sub-text {
      margin-top: 20px;
      font-size: 1.1rem;
      font-style: italic;
      color: #7e5a57;
    }

    @media (max-width: 600px) {
      h1 { font-size: 32px; }
      .image-header img { width: 120px; height: 120px; }
      .lang-btn { padding: 15px 40px; font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <div class="image-header">
      <img src="gayatri.png" alt="Gayatri">
      <img src="rigveda_purusha.jpg" alt="Rigveda Purusha">
    </div>

    <h1 class="telugu-text">ఋగ్వేద సూక్త సంగ్రాహము</h1>

    <div class="action-section">
      <a href="Rigveda_Sukta_Sangraha - Telugu.html" class="lang-btn telugu-text">ప్రవేశం (తెలుగు)</a>
      <p class="sub-text telugu-text">Rigveda Sukta Sangraha - Telugu Edition</p>
    </div>
  </div>

</body>
</html>
