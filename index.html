<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rigveda_Sukta_Sangraha </title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&family=Noto+Serif+Devanagari:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-dark: #4a2c2a;
      --saffron: #f4a261;
      --border-gold: #d4af37;
    }

    .telugu-text { font-family: 'Noto Sans Telugu', sans-serif; }
    .devanagari-text { font-family: 'Siddhanta', 'Noto Serif Devanagari', serif; }

    body {
      margin: 0;
      padding: 20px;
      font-family: "Georgia", serif;
      background: #e0c097 url('https://www.transparenttextures.com/patterns/paper-fibers.png');
      color: var(--primary-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .main-wrapper {
      background: rgba(255, 252, 240, 0.96);
      border: 8px double var(--border-gold);
      border-radius: 4px;
      max-width: 1000px;
      width: 100%;
      padding: 50px 30px;
      box-shadow: 0 0 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    .image-header {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 25px;
    }

    .image-header img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid var(--border-gold);
      padding: 5px;
      background: white;
    }

    h1 {
      font-size: 42px;
      margin: 0 0 30px 0;
      font-weight: normal;
      letter-spacing: 2px;
      color: #5e3a37;
    }

    /* Clean Shloka Section - No Headers */
    .shloka-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-bottom: 45px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.4);
      border-top: 1px solid rgba(212, 175, 55, 0.3);
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
    }

    .shloka-content {
      font-size: 1.25rem;
      line-height: 2.2;
      color: #2c1a19;
    }

    /* Language Buttons */
    .lang-grid {
      display: flex;
      justify-content: center;
      gap: 25px;
    }

    .lang-btn {
      text-decoration: none;
      color: var(--primary-dark);
      background: #fff8e7;
      padding: 15px 40px;
      border: 1px solid var(--border-gold);
      border-radius: 12px;
      font-size: 1.5rem;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .lang-btn:hover {
      background: var(--saffron);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }

    @media (max-width: 850px) {
      .shloka-container { grid-template-columns: 1fr; gap: 20px; }
      .image-header { gap: 15px; }
      .image-header img { width: 110px; height: 110px; }
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <div class="image-header">
    </div>

    <h1>Rigveda_Sukta_Sangraha </h1>

    <div class="lang-grid">
      <a href="Rigveda_Sukta_Sangraha - Telugu.html" class="lang-btn telugu-text">తెలుగు</a>
    </div>
  </div>

</body>
</html>
